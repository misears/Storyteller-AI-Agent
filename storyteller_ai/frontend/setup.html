<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storyteller AI Setup</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #0f172a; color: #e2e8f0; }
    .page { max-width: 960px; margin: 0 auto; padding: 24px; }
    h1, h2 { margin-bottom: 12px; color: #f8fafc; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input[type="text"], textarea, select { width: 100%; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; padding: 12px; font-size: 14px; }
    button { background: #2563eb; border: none; border-radius: 9999px; color: white; padding: 12px 20px; cursor: pointer; font-size: 14px; transition: background 0.2s ease; }
    button:hover { background: #1d4ed8; }
    .row { display: grid; gap: 20px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .result { white-space: pre-wrap; background: #0b1120; padding: 16px; border-radius: 14px; border: 1px solid #334155; min-height: 140px; }
    .doc-list { list-style: none; padding-left: 0; }
    .doc-list li { margin-bottom: 8px; }
    .hint { color: #94a3b8; font-size: 13px; margin-top: 8px; }
    .steps { padding-left: 20px; margin: 0; color: #cbd5e1; }
    .steps li { margin-bottom: 10px; }
    .info { color: #cbd5e1; margin-top: 8px; font-size: 14px; }
    .link-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="page">
  <h1>Storyteller AI Setup</h1>
  <div class="link-row">
    <button onclick="window.location.href='index.html'">Home</button>
    <button onclick="window.location.href='character_tracker.html'">Character Tracker</button>
  </div>
  <div class="card">
    <h2>Session setup</h2>
    <div class="row grid-2">
      <div>
        <label for="session-mode">Mode</label>
        <select id="session-mode">
          <option value="group">group</option>
          <option value="solo">solo</option>
          <option value="assistant">assistant</option>
        </select>
      </div>
      <div>
        <label for="game-title">Game title</label>
        <input id="game-title" type="text" placeholder="Story title or chronicle name" />
      </div>
    </div>
    <div class="row grid-2">
      <div>
        <label for="game-setting">Setting</label>
        <select id="game-setting">
          <option value="Old World of Darkness">Old World of Darkness</option>
          <option value="New World of Darkness">New World of Darkness</option>
          <option value="Changeling">Changeling</option>
          <option value="Generic Fantasy">Generic Fantasy</option>
          <option value="Custom">Custom</option>
        </select>
      </div>
      <div style="display:flex; align-items:flex-end;">
        <button id="create-session">Create Game</button>
      </div>
    </div>
    <label for="book-select">Choose loaded documents for this session</label>
    <select id="book-select" multiple size="4"></select>
    <p class="hint">Select the documents you want active for the game session.</p>
    <div class="result" id="session-result"></div>
  </div>

  <div class="card">
    <h2>Upload story books</h2>
    <input id="pdf-file" type="file" accept="application/pdf" multiple />
    <button id="upload-pdf">Upload PDFs</button>
    <div class="result" id="upload-result"></div>
  </div>

  <div class="card">
    <h2>Loaded documents</h2>
    <ul class="doc-list" id="doc-list"></ul>
  </div>
</div>
<script>
  const apiBase = window.location.origin;

  async function createSession() {
    const mode = document.getElementById('session-mode').value;
    const title = document.getElementById('game-title').value;
    const setting = document.getElementById('game-setting').value;
    const selected = Array.from(document.getElementById('book-select').selectedOptions).map(option => option.value);

    const response = await fetch(`${apiBase}/sessions/create`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({mode, title, setting, document_ids: selected}),
    });
    const data = await response.json();
    document.getElementById('session-result').textContent = JSON.stringify(data, null, 2);
  }

  async function uploadPdf() {
    const fileInput = document.getElementById('pdf-file');
    if (!fileInput.files.length) return;
    const form = new FormData();
    for (const file of fileInput.files) {
      form.append('files', file);
    }

    const response = await fetch(`${apiBase}/documents/upload`, {
      method: 'POST',
      body: form,
    });
    const data = await response.json();
    document.getElementById('upload-result').textContent = JSON.stringify(data, null, 2);
    await refreshDocuments();
  }

  async function refreshDocuments() {
    const response = await fetch(`${apiBase}/documents/list`);
    const data = await response.json();
    const list = document.getElementById('doc-list');
    const select = document.getElementById('book-select');
    list.innerHTML = '';
    select.innerHTML = '';
    for (const doc of data.documents) {
      const item = document.createElement('li');
      item.textContent = `${doc.title} — ${doc.size} chars`;
      list.appendChild(item);

      const option = document.createElement('option');
      option.value = doc.document_id;
      option.textContent = doc.title;
      select.appendChild(option);
    }
  }

  document.getElementById('create-session').addEventListener('click', createSession);
  document.getElementById('upload-pdf').addEventListener('click', uploadPdf);
  refreshDocuments();
</script>
</body>
</html>
