<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #0f172a; color: #e2e8f0; }
    .page { max-width: 960px; margin: 0 auto; padding: 24px; }
    h1, h2 { margin-bottom: 12px; color: #f8fafc; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input[type="text"], textarea, select { width: 100%; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; padding: 12px; font-size: 14px; }
    button { background: #2563eb; border: none; border-radius: 9999px; color: white; padding: 12px 20px; cursor: pointer; font-size: 14px; transition: background 0.2s ease; }
    button:hover { background: #1d4ed8; }
    .row { display: grid; gap: 20px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .result { white-space: pre-wrap; background: #0b1120; padding: 16px; border-radius: 14px; border: 1px solid #334155; min-height: 140px; }
    .character-list { list-style: none; padding-left: 0; }
    .character-list li { margin-bottom: 8px; }
    .hint { color: #94a3b8; font-size: 13px; margin-top: 8px; }
    .link-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="page">
  <h1>Character Tracker</h1>
  <div class="link-row">
    <button onclick="window.location.href='index.html'">Home</button>
    <button onclick="window.location.href='setup.html'">Setup</button>
  </div>

  <div class="card">
    <h2>Select session</h2>
    <label for="session-select">Active sessions</label>
    <select id="session-select"></select>
    <button id="load-session">Load Session</button>
    <div class="result" id="session-info"></div>
  </div>

  <div class="card">
    <h2>Create character</h2>
    <label for="tracker-session-id">Session ID</label>
    <input id="tracker-session-id" type="text" placeholder="session id" />
    <label for="tracker-name">Name</label>
    <input id="tracker-name" type="text" placeholder="Character name" />
    <label for="tracker-clan">Clan / Type</label>
    <input id="tracker-clan" type="text" placeholder="Vampire clan, changeling court, etc." />
    <label for="tracker-notes">Notes</label>
    <textarea id="tracker-notes" rows="3" placeholder="Background, traits, or tracking notes"></textarea>
    <button id="add-character">Add Character</button>
    <div class="result" id="tracker-result"></div>
  </div>

  <div class="card">
    <h2>Session characters</h2>
    <button id="refresh-characters">Refresh Character List</button>
    <ul class="character-list" id="character-list"></ul>
  </div>
</div>
<script>
  const apiBase = window.location.origin;
  let activeSessions = {};

  async function loadActiveSessions() {
    const select = document.getElementById('session-select');
    select.innerHTML = '';

    try {
      const response = await fetch(`${apiBase}/sessions`);
      if (response.ok) {
        const data = await response.json();
        activeSessions = data.sessions || {};
        for (const [sessionId, session] of Object.entries(activeSessions)) {
          const option = document.createElement('option');
          option.value = sessionId;
          option.textContent = `${session.title || 'Untitled'} (${session.setting || 'No setting'}) - ${sessionId.substring(0, 8)}...`;
          select.appendChild(option);
        }
      }
    } catch (error) {
      console.error('Failed to load sessions:', error);
      select.innerHTML = '<option>No sessions available</option>';
    }
  }

  async function loadSession() {
    const sessionId = document.getElementById('session-select').value;
    if (!sessionId) {
      document.getElementById('session-info').textContent = 'Select a session first.';
      return;
    }

    const response = await fetch(`${apiBase}/sessions/${sessionId}`);
    const data = await response.json();

    document.getElementById('tracker-session-id').value = sessionId;
    document.getElementById('session-info').textContent = JSON.stringify(
      {
        title: data.state.campaign?.title || 'Untitled',
        setting: data.state.campaign?.setting || 'Unknown',
        mode: data.mode,
        characters: data.state.characters?.length || 0,
      },
      null,
      2
    );
    await refreshCharacters();
  }

  async function addCharacter() {
    const sessionId = document.getElementById('tracker-session-id').value;
    const name = document.getElementById('tracker-name').value;
    const clan = document.getElementById('tracker-clan').value;
    const notes = document.getElementById('tracker-notes').value;

    if (!sessionId || !name) {
      document.getElementById('tracker-result').textContent = 'Session ID and character name are required.';
      return;
    }

    const response = await fetch(`${apiBase}/sessions/${sessionId}/characters`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, clan, notes}),
    });
    const data = await response.json();
    document.getElementById('tracker-result').textContent = JSON.stringify(data, null, 2);
    document.getElementById('tracker-name').value = '';
    document.getElementById('tracker-clan').value = '';
    document.getElementById('tracker-notes').value = '';
    await refreshCharacters();
  }

  async function refreshCharacters() {
    const sessionId = document.getElementById('tracker-session-id').value;
    if (!sessionId) {
      document.getElementById('character-list').innerHTML = '<li>Enter a session ID to load characters.</li>';
      return;
    }

    const response = await fetch(`${apiBase}/sessions/${sessionId}`);
    const data = await response.json();
    const list = document.getElementById('character-list');
    list.innerHTML = '';
    if (!data.state.characters || !data.state.characters.length) {
      list.innerHTML = '<li>No characters yet.</li>';
      return;
    }

    for (const character of data.state.characters) {
      const item = document.createElement('li');
      item.textContent = `${character.name} (${character.clan || 'No clan'}) - ${character.notes || 'No notes'}`;
      list.appendChild(item);
    }
  }

  document.getElementById('load-session').addEventListener('click', loadSession);
  document.getElementById('add-character').addEventListener('click', addCharacter);
  document.getElementById('refresh-characters').addEventListener('click', refreshCharacters);
  loadActiveSessions();
</script>
</body>
</html>
